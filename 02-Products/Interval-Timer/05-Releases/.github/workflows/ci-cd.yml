# GitHub Actions CI/CD 工作流 - Interval Timer

name: iOS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # 任务 1：单元测试
  test:
    name: 单元测试
    runs-on: macos-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Xcode 版本
      run: sudo xcode-select -s /Applications/Xcode_15.0.app
    
    - name: 运行单元测试
      run: |
        xcodebuild test \
          -project IntervalTimer.xcodeproj \
          -scheme IntervalTimer \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          -only-testing:IntervalTimerTests \
          clean test
    
    - name: 上传测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results.xcresult

  # 任务 2：构建 Debug 版本
  build-debug:
    name: 构建 Debug 版本
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 构建 Debug 版本
      run: |
        xcodebuild build \
          -project IntervalTimer.xcodeproj \
          -scheme IntervalTimer \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          clean build
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: debug-build
        path: build/Debug-iphonesimulator/

  # 任务 3：构建 Release 版本并分发
  build-release:
    name: 构建 Release 版本
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 安装 Fastlane
      run: sudo gem install fastlane -N
    
    - name: 解码证书和私钥
      env:
        CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        # 解码并安装证书
        echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
        security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A
        
        # 解码并安装描述文件
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
    
    - name: 运行 Fastlane（Beta 分发）
      if: github.ref == 'refs/heads/main'
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: fastlane beta
    
    - name: 运行 Fastlane（App Store 发布）
      if: startsWith(github.ref, 'refs/tags/')
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: fastlane release
    
    - name: 上传 IPA 文件
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-ipa
        path: *.ipa

  # 任务 4：发送通知
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [test, build-debug, build-release]
    if: always()
    
    steps:
    - name: 发送 Slack 通知
      if: secrets.SLACK_WEBHOOK_URL != ''
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ "${{ needs.test.result }}" == "success" ]; then
          STATUS="✅ 成功"
        else
          STATUS="❌ 失败"
        fi
        
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"CI/CD 构建 $STATUS\\n分支: ${{ github.ref }}\\n提交: ${{ github.sha }}\"}" \
          "$SLACK_WEBHOOK_URL"
